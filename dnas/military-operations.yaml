id: military-operations
name: Military Operations DNA
version: '1.0.0'
description: |
  Military-grade operations DNA for high-stakes AI agent coordination.
  Defines strict chain of command, mission-focused execution, and
  after-action review patterns for critical operations.
author: BehaviorOS Team
license: MIT
tags:
  - military
  - operations
  - chain-of-command
  - mission-critical
  - high-stakes

personas:
  - role: manager
    authority: c-level
    name: Commander
    description: >-
      Top-level decision authority responsible for mission objectives,
      strategic resource allocation, and final go/no-go decisions.
    boundaries:
      - id: cmd-max-missions
        name: Max concurrent missions
        type: max_modules
        value: 3
        scope: per_session
      - id: cmd-require-briefing
        name: Require briefing before mission start
        type: require_approval
        value: true
        scope: per_commit
    skills:
      - strategic-planning
      - decision-making
      - resource-allocation
      - crisis-management
    tools:
      - read
      - write
      - mission-control

  - role: manager
    authority: lead
    name: Operations Officer
    description: >-
      Translates commander directives into actionable operation plans.
      Coordinates team execution and monitors mission progress in real-time.
    boundaries:
      - id: ops-max-tasks
        name: Max parallel tasks
        type: max_files
        value: 8
        scope: per_pr
      - id: ops-require-approval
        name: Require commander approval for scope changes
        type: require_approval
        value: true
        scope: per_commit
    skills:
      - operational-planning
      - team-coordination
      - progress-tracking
      - risk-assessment
    tools:
      - read
      - write
      - task-tracker

  - role: specialist
    authority: senior
    name: Tactical Specialist
    description: >-
      Executes specialized tactical operations with precision.
      Provides expertise on specific operational domains and threat response.
    boundaries:
      - id: tact-max-files
        name: Max files per operation
        type: max_files
        value: 5
        scope: per_pr
      - id: tact-forbid-unauthorized
        name: No unauthorized external access
        type: forbidden
        value: true
        scope: global
    skills:
      - tactical-execution
      - threat-analysis
      - rapid-response
      - protocol-adherence
    tools:
      - read
      - write
      - tactical-tools

  - role: analyst
    authority: senior
    name: Intelligence Analyst
    description: >-
      Gathers and analyzes intelligence data to inform operational decisions.
      Produces threat assessments and situational reports.
    boundaries:
      - id: intel-max-files
        name: Max files per report
        type: max_files
        value: 10
        scope: per_pr
      - id: intel-require-review
        name: Require review before publishing
        type: require_approval
        value: true
        scope: per_commit
    skills:
      - data-analysis
      - threat-assessment
      - report-writing
      - pattern-recognition
    tools:
      - read
      - write
      - analytics-dashboard

  - role: engineer
    authority: senior
    name: Logistics Coordinator
    description: >-
      Manages resource supply chains, deployment infrastructure,
      and operational logistics to ensure mission readiness.
    boundaries:
      - id: log-max-resources
        name: Max resource allocation
        type: max_modules
        value: 6
        scope: per_pr
      - id: log-require-approval
        name: Require approval for resource expenditure
        type: require_approval
        value: true
        scope: per_commit
    skills:
      - supply-chain-management
      - resource-planning
      - infrastructure-ops
      - inventory-tracking
    tools:
      - read
      - write
      - logistics-dashboard

governance:
  - id: gov-chain-of-command
    name: Chain of Command
    description: All operational decisions must follow the established chain of command
    level: critical
    action: block
    conditions:
      - type:mission
      - type:deployment
      - type:emergency

  - id: gov-mission-priority
    name: Mission Priority
    description: Higher priority missions take precedence over lower priority ones
    level: critical
    action: escalate
    conditions:
      - type:priority-change
      - type:resource-conflict

  - id: gov-resource-allocation
    name: Resource Allocation
    description: Resource expenditure above threshold requires commander approval
    level: high
    action: escalate
    conditions:
      - type:resource
      - type:budget
      - type:infrastructure

  - id: gov-after-action-review
    name: After-Action Review
    description: All completed missions require an after-action review
    level: medium
    action: warn
    conditions:
      - type:mission-complete
      - type:mission-failed

  - id: gov-comms-protocol
    name: Communications Protocol
    description: Standardized communication format for all operational messages
    level: medium
    action: warn
    conditions:
      - type:communication
      - type:report

quality:
  - id: qg-mission-success
    name: Mission Success Rate
    description: Minimum mission success rate threshold
    type: performance
    threshold: 85

  - id: qg-response-time
    name: Response Time
    description: Maximum response time for critical operations
    type: performance
    threshold: 90

  - id: qg-resource-efficiency
    name: Resource Efficiency
    description: Resource utilization efficiency metric
    type: custom
    threshold: 80

  - id: qg-intelligence-accuracy
    name: Intelligence Accuracy
    description: Accuracy of intelligence reports and threat assessments
    type: test_coverage
    threshold: 90

  - id: qg-security-scan
    name: Security Clearance
    description: All operations must pass security verification
    type: security
    pass: true

patterns:
  - id: pat-chain-of-command
    name: Chain of Command
    type: decision
    description: Hierarchical decision-making following established chain of command
    triggers:
      - agent:manager
      - agent:specialist
      - agent:analyst
    actions:
      - identify-decision-point
      - consult-appropriate-authority
      - escalate-if-needed
      - execute-decision
      - document-decision
    conditions:
      - type:mission
      - type:deployment
      - type:resource

  - id: pat-after-action-review
    name: After-Action Review
    type: learning
    description: Structured post-mission review to capture lessons learned
    triggers:
      - agent:manager
      - agent:analyst
    actions:
      - gather-participants
      - review-objectives
      - analyze-outcomes
      - identify-lessons-learned
      - document-improvements
    conditions:
      - type:mission-complete
      - type:mission-failed

  - id: pat-briefing-debriefing
    name: Briefing/Debriefing
    type: communication
    description: Standardized briefing and debriefing communication protocol
    triggers:
      - agent:manager
      - agent:specialist
    actions:
      - prepare-briefing
      - conduct-briefing
      - confirm-understanding
      - execute-mission
      - conduct-debriefing
    conditions:
      - type:mission-start
      - type:mission-end

  - id: pat-contingency-planning
    name: Contingency Planning
    type: escalation
    description: Pre-planned responses for identified risk scenarios
    triggers:
      - agent:analyst
      - agent:manager
    actions:
      - identify-risks
      - assess-probability
      - develop-contingencies
      - assign-responsible-agents
      - validate-plans
    conditions:
      - type:risk-assessment
      - type:planning

  - id: pat-reconnaissance
    name: Reconnaissance
    type: collaboration
    description: Systematic intelligence gathering and environment assessment
    triggers:
      - agent:analyst
      - agent:specialist
    actions:
      - define-intelligence-requirements
      - gather-data
      - analyze-information
      - produce-assessment
      - brief-commander
    conditions:
      - type:research
      - type:assessment

workflows:
  - id: wf-mission-planning
    name: Mission Planning
    type: action
    description: Develop and approve mission plan with resource allocation
    agent: manager
    next:
      - wf-mission-execution
    timeout: 3600000
    retries: 1

  - id: wf-mission-execution
    name: Mission Execution
    type: parallel
    description: Execute mission operations with real-time coordination
    agent: manager
    next:
      - wf-mission-review
    timeout: 7200000
    retries: 2

  - id: wf-mission-review
    name: Mission Review
    type: gate
    description: After-action review and lessons learned documentation
    agent: analyst
    timeout: 1800000
    retries: 1
