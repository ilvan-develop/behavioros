meta:
  version: "1.0.0"
  preset: "saas-b2c"
  description: "B2C SaaS — LGPD/GDPR, user-facing product, fast iteration"
  inherits: "bos/schemas/governance-schema.yaml"
  risk_level: medium

compliance:
  required_frameworks:
    - name: "LGPD"
      scope: "Brazilian data protection"
      audit_frequency: "annual"
    - name: "GDPR"
      scope: "EU data protection"
      audit_frequency: "annual"
    - name: "OWASP_Top10"
      scope: "application security"
      audit_frequency: "per_release"
  extra_requirements:
    - "User data export and deletion within 30 days"
    - "Consent management for all data collection"
    - "Privacy by design for new features"
    - "Data retention policies enforced automatically"

behavior_selector:
  defaults:
    feature: manufacturing
    bug_fix: manufacturing
    security: immune-system
    incident: surgical-team
    refactor: ant-colony
    performance: mathematical-swarm
    discovery: research-lab

squads:
  frontend:
    swarm: bee-colony
    rules:
      - pixel-perfect-implementation
      - real-time-user-feedback
      - responsive-mobile-first
      - optimistic-ui-updates
      - accessibility-wcag-aa
      - performance-budget-enforcement
    cannot_modify: ["apps/api/**", "packages/db/**", "k8s/**"]
    description: "Pixel-perfect UI, real-time feedback, accessibility-first"

  backend:
    swarm: manufacturing
    rules:
      - rest-best-practices
      - rate-limiting-on-all-endpoints
      - input-validation-strict
      - graceful-error-responses
      - api-versioning-from-day-one
      - request-id-tracking
    cannot_modify: ["apps/web/**", "k8s/**"]
    description: "REST best practices, rate limiting, versioned APIs"

  qa:
    swarm: immune-system
    rules:
      - load-testing-before-release
      - accessibility-testing-automated
      - cross-browser-testing
      - mobile-device-testing
      - user-flow-regression
      - performance-budget-gates
    authority: ["approve_release", "veto_deploy"]
    description: "Load testing, accessibility, cross-browser, mobile testing"

  security:
    swarm: immune-system
    rules:
      - owasp-top10-enforcement
      - data-privacy-by-design
      - consent-management
      - session-security-hardening
      - api-security-best-practices
      - dependency-vulnerability-scanning
    authority: ["veto", "halt_deploy", "security_review"]
    description: "OWASP, data privacy, consent management, session security"

  devops:
    swarm: surgical-team
    rules:
      - auto-scaling-configured
      - canary-deploys-for-frontend
      - blue-green-for-backend
      - infrastructure-as-code
      - monitoring-and-alerting
      - rollback-automated
    description: "Auto-scaling, canary deploys, automated rollbacks"

  platform:
    swarm: octopus
    rules:
      - shared-component-library
      - design-system-consistency
      - api-contract-testing
      - dependency-audit-weekly
    description: "Shared component library, design system, contract testing"

governance:
  overrides: {}

  authority_overrides:
    junior:
      max_files_per_change: 2
      max_packages: 1
      can_deploy: false
      can_approve: false
      can_veto: false
      can_modify_schema: false
      can_change_contracts: false
      escalation_required: true
    senior:
      max_files_per_change: 15
      max_packages: 4
      can_change_contracts: true
    architect:
      schema_review: true
      contract_review: true

escalation:
  overrides:
    - trigger: "performance_regression_detected"
      action: "halt_and_activate_mathematical_swarm"
      timeout: "immediate"
      retry: 1
      severity: high
      description: "Performance regression halts feature work, swarm activates"

    - trigger: "accessibility_violation_detected"
      action: "notify_frontend_squad"
      timeout: "10min"
      retry: 2
      severity: medium
      description: "Accessibility violations need immediate frontend attention"

    - trigger: "data_privacy_breach"
      action: "halt_all_activate_immune_system"
      timeout: "immediate"
      retry: 0
      severity: critical
      description: "Data privacy breach halts everything, full immune response"

    - trigger: "user_data_deletion_request"
      action: "prioritize_and_execute"
      timeout: "24h"
      retry: 1
      severity: high
      description: "LGPD/GDPR deletion requests must be processed within SLA"

  inherits: "bos/schemas/governance-schema.yaml#escalation_matrix"
  merge_strategy: "override_and_append"
