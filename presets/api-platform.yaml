meta:
  version: "1.0.0"
  preset: "api-platform"
  description: "API platform — SOC2/PCI-DSS, versioning, rate limiting, developer portal, API-first"
  inherits: "bos/schemas/governance-schema.yaml"
  risk_level: high

compliance:
  required_frameworks:
    - name: "SOC2"
      scope: "security, availability, confidentiality"
      audit_frequency: "annual"
    - name: "PCI-DSS"
      scope: "payment card data handling"
      audit_frequency: "quarterly"
    - name: "OWASP_API_Top10"
      scope: "API security"
      audit_frequency: "per_release"
    - name: "OpenAPI_Spec"
      scope: "API contract standards"
      audit_frequency: "per_release"
  extra_requirements:
    - "API versioning strategy enforced from day one"
    - "Rate limiting on all public endpoints"
    - "API key rotation and lifecycle management"
    - "Idempotency for all mutation endpoints"
    - "Comprehensive API documentation"
    - "Developer portal with sandbox environment"

behavior_selector:
  defaults:
    feature: manufacturing
    bug_fix: manufacturing
    security: immune-system
    incident: surgical-team
    refactor: ant-colony
    performance: mathematical-swarm
    discovery: research-lab

squads:
  frontend:
    swarm: bee-colony
    rules:
      - developer-portal-ux
      - interactive-api-documentation
      - sandbox-environment-availability
      - api-explorer-with-try-it
      - sdk-generation-from-spec
      - changelog-and-deprecation-visibility
    cannot_modify: ["apps/api/**", "packages/db/**", "k8s/**"]
    description: "Developer portal, interactive docs, sandbox, SDK generation"

  backend:
    swarm: manufacturing
    rules:
      - api-versioning-mandatory
      - rate-limiting-on-all-endpoints
      - idempotency-on-all-mutations
      - request-validation-strict
      - response-shape-consistency
      - error-response-standards
      - pagination-for-all-lists
      - webhook-retry-with-backoff
      - api-key-rotation-support
      - deprecation-headers-on-legacy
    cannot_modify: ["apps/web/**", "k8s/**"]
    description: "API versioning, rate limiting, idempotency, webhook reliability"

  qa:
    swarm: immune-system
    rules:
      - contract-testing-first
      - load-testing-all-endpoints
      - rate-limit-verification
      - idempotency-verification
      - backward-compatibility-testing
      - error-response-validation
      - api-security-testing
    authority: ["approve_release", "veto_deploy"]
    description: "Contract testing, load testing, rate limit verification, API security"

  security:
    swarm: immune-system
    rules:
      - api-key-management-enforcement
      - oauth2-flow-security
      - rate-limit-abuse-prevention
      - input-injection-prevention
      - response-data-filtering
      - api-gateway-security-policies
    authority: ["veto", "halt_deploy", "security_review"]
    description: "API key management, OAuth2, rate limit abuse, injection prevention"

  devops:
    swarm: surgical-team
    rules:
      - api-gateway-configuration
      - cdn-for-static-api-responses
      - load-balancer-health-checks
      - api-version-routing
      - infrastructure-as-code
      - rollback-automated
    description: "API gateway, CDN, load balancing, version routing"

  platform:
    swarm: octopus
    rules:
      - shared-contracts-versioned
      - openapi-spec-maintained
      - dependency-audit-weekly
      - monorepo-boundary-enforcement
      - sdk-generation-pipeline
    description: "OpenAPI spec, shared contracts, SDK generation pipeline"

governance:
  overrides:
    security:
      can_veto: true
      can_halt_deploy: true
      required_for: ["api-key-policy-changes", "oauth-flow-modifications", "rate-limit-policy"]
      description: "Security has veto on API key policies and OAuth changes"
    architect:
      schema_review: true
      contract_review: true
      required_for: ["api-versioning-strategy", "breaking-change-approval", "contract-version-bumps"]
      description: "Architect required for API versioning and breaking changes"

  authority_overrides:
    junior:
      max_files_per_change: 1
      max_packages: 1
      can_deploy: false
      can_approve: false
      can_veto: false
      can_modify_schema: false
      can_change_contracts: false
      escalation_required: true
      restrictions: ["no-api-versioning-changes", "no-rate-limit-modifications", "no-lead-on-breaking-changes"]
    senior:
      can_change_contracts: false
      restrictions: ["requires-architect-for-versioning", "requires-review-for-rate-limit-changes"]
    architect:
      required_for: ["api-versioning-strategy", "breaking-change-approval", "new-endpoint-design", "contract-version-bumps"]

escalation:
  overrides:
    - trigger: "rate_limit_breach"
      action: "activate_immune_system"
      timeout: "immediate"
      retry: 0
      severity: high
      description: "Rate limit breach activates immune system for abuse prevention"

    - trigger: "security_vulnerability_detected"
      action: "halt_all_activate_immune_system"
      timeout: "immediate"
      retry: 0
      severity: critical
      description: "Security vulnerability halts everything, full immune response"

    - trigger: "api_breaking_change_detected"
      action: "require_architect_approval"
      timeout: "15min"
      retry: 1
      severity: high
      description: "Breaking API change detected, architect must approve"

    - trigger: "developer_portal_down"
      action: "activate_surgical_team"
      timeout: "immediate"
      retry: 0
      severity: critical
      description: "Developer portal downtime halts external integrations"

    - trigger: "idempotency_key_collision"
      action: "halt_and_review"
      timeout: "5min"
      retry: 1
      severity: high
      description: "Idempotency collision requires investigation"

    - trigger: "webhook_delivery_failure"
      action: "activate_surgical_team"
      timeout: "5min"
      retry: 3
      severity: high
      description: "Webhook delivery failures escalate to surgical-team"

    - trigger: "api_response_time_regression"
      action: "halt_and_activate_mathematical_swarm"
      timeout: "immediate"
      retry: 1
      severity: high
      description: "API response time regression halts features, swarm optimizes"

    - trigger: "contract_breaking_change_proposed"
      action: "require_architect_approval"
      timeout: "15min"
      retry: 1
      severity: high
      description: "Breaking contract changes require architect approval"

  inherits: "bos/schemas/governance-schema.yaml#escalation_matrix"
  merge_strategy: "override_and_append"
