name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Comprehensive Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
        id: pnpm-cache

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build all packages
        run: pnpm --filter @behavioros/schemas --filter @behavioros/core --filter @behavioros/sdk --filter @behavioros/mcp-server --filter @behavioros/dnas --filter @behavioros/cli --filter @behavioros/observability-dashboard --filter @behavioros/finpay-integration build

      - name: Test core
        run: pnpm --filter @behavioros/core test

      - name: Test SDK
        run: pnpm --filter @behavioros/sdk test

      - name: Test MCP server
        run: pnpm --filter @behavioros/mcp-server test

      - name: Test DNAs
        run: pnpm --filter @behavioros/dnas test

      - name: Test CLI
        run: pnpm --filter @behavioros/cli test

      - name: Test observability-dashboard
        run: pnpm --filter @behavioros/observability-dashboard test

      - name: Test finpay-integration
        run: pnpm --filter @behavioros/finpay-integration test

      - name: Validate DNA configurations
        run: npx @behavioros/cli validate

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            packages/*/coverage/
            **/coverage/
          retention-days: 7
          if-no-files-found: warn
